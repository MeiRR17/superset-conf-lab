# =============================================================================
# Telephony Load Monitoring System - Docker Compose Configuration
# =============================================================================
# This file orchestrates all 6 services of the Telephony Load Monitoring System:
#   1. PostgreSQL - Database for metrics and Superset metadata
#   2. Redis - Caching layer for Superset
#   3. Mock Server - Simulates Cisco UCCX and CUCM endpoints
#   4. Proxy Gateway - Collects metrics and stores in PostgreSQL
#   5. Superset - Apache Superset for dashboards and visualization
#   6. Nginx - Reverse proxy and single entry point
# =============================================================================
# =============================================================================
# Services Definition
# =============================================================================
services:

  # ===========================================================================
  # Service 1: PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: telephony-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telephony_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - telephony-network

  # ===========================================================================
  # Service 2: Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: telephony-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - telephony-network

  # ===========================================================================
  # Service 3: Mock Cisco Server
  # ===========================================================================
  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: telephony-mock-server
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - telephony-network

  # ===========================================================================
  # Service 4: Proxy Gateway
  # ===========================================================================
  proxy-gateway:
    build:
      context: ./proxy-gateway
      dockerfile: Dockerfile
    container_name: telephony-proxy-gateway
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/telephony_db
      MOCK_SERVER_URL: http://mock-server:8001
      ENABLE_POLLING: "true"
      POLLING_INTERVAL: "60"
      REQUEST_TIMEOUT: "10"
      PYTHONUNBUFFERED: 1
      
      # TGW Configuration
      TGW_HOST: ${TGW_HOST:-localhost}
      TGW_SNMP_COMMUNITY: ${TGW_SNMP_COMMUNITY:-public}
      TGW_SNMP_PORT: ${TGW_SNMP_PORT:-161}
      TGW_SNMP_VERSION: ${TGW_SNMP_VERSION:-2c}
      TGW_SNMP_TIMEOUT: ${TGW_SNMP_TIMEOUT:-5}
      USE_REAL_TGW: ${USE_REAL_TGW:-false}
      
      # SBC Configuration
      SBC_HOST: ${SBC_HOST:-localhost}
      SBC_USERNAME: ${SBC_USERNAME:-}
      SBC_PASSWORD: ${SBC_PASSWORD:-}
      SBC_PORT: ${SBC_PORT:-443}
      SBC_VERIFY_SSL: ${SBC_VERIFY_SSL:-false}
      SBC_API_VERSION: ${SBC_API_VERSION:-v1}
      USE_REAL_SBC: ${USE_REAL_SBC:-false}
      
      # Expressway Configuration
      EXPRESSWAY_HOST: ${EXPRESSWAY_HOST:-localhost}
      EXPRESSWAY_USERNAME: ${EXPRESSWAY_USERNAME:-}
      EXPRESSWAY_PASSWORD: ${EXPRESSWAY_PASSWORD:-}
      EXPRESSWAY_PORT: ${EXPRESSWAY_PORT:-443}
      EXPRESSWAY_VERIFY_SSL: ${EXPRESSWAY_VERIFY_SSL:-false}
      EXPRESSWAY_API_VERSION: ${EXPRESSWAY_API_VERSION:-v1}
      USE_REAL_EXPRESSWAY: ${USE_REAL_EXPRESSWAY:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - telephony-network

  # ===========================================================================
  # Service 5: Apache Superset
  # ===========================================================================
  superset:
    build: ./superset
    container_name: telephony-superset
    restart: unless-stopped
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      DATABASE_URL: postgresql://postgres:password@postgres:5432/telephony_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-super-secret-key-change-in-production
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/superset-init.sh:/app/superset-init.sh:ro
      - superset_data:/app/superset_home
    command: ["/app/superset-init.sh"]
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - telephony-network

  # ===========================================================================
  # Service 6: Nginx Reverse Proxy (Optional but enabled)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: telephony-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      superset:
        condition: service_started
      proxy-gateway:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telephony-network

# =============================================================================
# Named Volumes for Data Persistence
# =============================================================================
volumes:
  # PostgreSQL data directory
  postgres_data:
    driver: local
  
  # Redis data directory
  redis_data:
    driver: local
  
  # Superset home directory (uploads, exports)
  superset_data:
    driver: local

# =============================================================================
# Docker Networks
# =============================================================================
networks:
  # Custom bridge network for service communication
  telephony-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
